{% extends "app/base.html" %}
{% block title %}CYM — Dashboard{% endblock %}
{% block content %}
<div class="max-w-6xl mx-auto space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-white"><i class="fas fa-th-large text-primary-400 mr-3"></i>Dashboard</h1>
    <p class="text-sm text-slate-400 mt-1">Resumen general de tu empresa</p>
  </div>

  <div id="kpis" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
    <div class="glass-card p-4 text-center"><i class="fas fa-spinner fa-spin text-slate-500"></i></div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div>
      <h2 class="text-sm font-semibold text-white mb-3"><i class="fas fa-file-contract text-emerald-400 mr-2"></i>Últimos Contratos</h2>
      <div id="contratos_recientes" class="space-y-2"></div>
    </div>
    <div>
      <h2 class="text-sm font-semibold text-white mb-3"><i class="fas fa-bell text-rose-400 mr-2"></i>Alertas Recientes</h2>
      <div id="alertas_recientes" class="space-y-2"></div>
    </div>
  </div>

  <div class="glass-card p-4">
    <h3 class="text-sm font-semibold text-slate-300 mb-3"><i class="fas fa-chart-line text-blue-400 mr-2"></i>Parámetros Previsionales</h3>
    <div id="parametros_info" class="text-xs text-slate-400"></div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/js/app/dashboard.js"></script>
{% endblock %}
