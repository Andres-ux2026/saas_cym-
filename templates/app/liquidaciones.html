{% extends "app/base.html" %}
{% block title %}CYM — Liquidaciones{% endblock %}
{% block content %}
<div class="max-w-5xl mx-auto space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-white"><i class="fas fa-file-invoice-dollar text-green-400 mr-3"></i>Liquidaciones</h1>
      <p class="text-sm text-slate-400 mt-1">Gestión de liquidaciones de sueldo mensual</p>
    </div>
    <button onclick="mostrarFormulario()" class="btn-primary flex items-center gap-2 text-xs"><i class="fas fa-plus"></i> Nueva Liquidación</button>
  </div>

  <div id="mensaje" class="hidden px-4 py-3 rounded-lg text-sm"></div>

  <div class="flex gap-2 mb-4">
    <select id="filtro_contrato" class="input-field max-w-xs text-sm" onchange="listarLiquidaciones()">
      <option value="">Todos los contratos</option>
      {% for c in contratos %}
      <option value="{{ c.id }}">{{ c.nombres }} {{ c.apellidos }} — {{ c.empresa.razon_social }}</option>
      {% endfor %}
    </select>
  </div>

  <div id="lista_liquidaciones" class="space-y-3"></div>

  <div id="form_liquidacion" class="hidden glass-card p-6">
    <h2 class="text-lg font-semibold text-white mb-5"><i class="fas fa-calculator text-green-400 mr-2"></i>Generar Liquidación</h2>
    <form id="liqForm" class="space-y-4" onsubmit="return generarLiquidacion(event)">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Contrato</label>
          <select id="liq_contrato" class="input-field" required>
            <option value="">Seleccionar...</option>
            {% for c in contratos %}
            <option value="{{ c.id }}" data-sb="{{ c.sueldo_base|floatformat:'0' }}" data-col="{{ c.colacion|floatformat:'0' }}" data-mov="{{ c.movilizacion|floatformat:'0' }}">{{ c.nombres }} {{ c.apellidos }} — {{ c.empresa.razon_social }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Período</label>
          <input type="month" id="liq_periodo" class="input-field" required>
        </div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Sueldo Base ($)</label>
          <input type="number" id="liq_sb" class="input-field" min="0" step="1" required>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Colación ($)</label>
          <input type="number" id="liq_col" class="input-field" min="0" step="1" value="0">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Movilización ($)</label>
          <input type="number" id="liq_mov" class="input-field" min="0" step="1" value="0">
        </div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Horas Extra (cantidad)</label>
          <input type="number" id="liq_he_cant" class="input-field" min="0" step="0.5" value="0" oninput="calcularHE()">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Valor Hora Extra ($)</label>
          <input type="number" id="liq_he_valor" class="input-field" min="0" step="1" value="0" oninput="calcularHE()">
        </div>
      </div>
      <div id="liq_preview" class="hidden bg-dark-800/50 rounded-lg p-4 border border-green-700/50">
        <h3 class="text-sm font-semibold text-green-400 mb-3">Vista Previa</h3>
        <div id="liq_preview_data" class="text-xs text-slate-300 space-y-1"></div>
      </div>
      <div class="flex justify-end gap-3">
        <button type="button" onclick="cancelarFormulario()" class="btn-secondary">Cancelar</button>
        <button type="submit" class="btn-primary flex items-center gap-2"><i class="fas fa-save"></i> Generar Liquidación</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/js/app/liquidaciones.js"></script>
{% endblock %}
