{% extends "app/base.html" %}
{% block title %}CYM — Finiquitos{% endblock %}
{% block content %}
<div class="max-w-5xl mx-auto space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-white"><i class="fas fa-file-signature text-amber-400 mr-3"></i>Finiquitos</h1>
      <p class="text-sm text-slate-400 mt-1">Cálculo y gestión de finiquitos por término de contrato</p>
    </div>
    <button onclick="mostrarFormulario()" class="btn-primary flex items-center gap-2 text-xs"><i class="fas fa-plus"></i> Nuevo Finiquito</button>
  </div>

  <div id="mensaje" class="hidden px-4 py-3 rounded-lg text-sm"></div>

  <div class="flex gap-2 mb-4">
    <select id="filtro_contrato" class="input-field max-w-xs text-sm" onchange="listarFiniquitos()">
      <option value="">Todos los contratos</option>
      {% for c in contratos %}
      <option value="{{ c.id }}">{{ c.nombres }} {{ c.apellidos }} — {{ c.empresa.razon_social }}</option>
      {% endfor %}
    </select>
  </div>

  <div id="lista_finiquitos" class="space-y-3"></div>

  <div id="form_finiquito" class="hidden glass-card p-6">
    <h2 class="text-lg font-semibold text-white mb-5"><i class="fas fa-calculator text-amber-400 mr-2"></i>Calcular Finiquito</h2>
    <form id="finForm" class="space-y-4" onsubmit="return generarFiniquito(event)">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Contrato</label>
          <select id="fin_contrato" class="input-field" required>
            <option value="">Seleccionar...</option>
            {% for c in contratos %}
            <option value="{{ c.id }}" data-sb="{{ c.sueldo_base|floatformat:'0' }}" data-inicio="{{ c.fecha_inicio|date:'Y-m-d' }}">{{ c.nombres }} {{ c.apellidos }} — {{ c.empresa.razon_social }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Fecha de Término</label>
          <input type="date" id="fin_fecha_termino" class="input-field" required>
        </div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Causal de Término</label>
          <select id="fin_causal" class="input-field" required>
            <option value="">Seleccionar...</option>
            <option value="mutuo_acuerdo">Mutuo acuerdo (Art.159 N°1)</option>
            <option value="renuncia">Renuncia del trabajador (Art.159 N°2)</option>
            <option value="muerte">Muerte del trabajador (Art.159 N°3)</option>
            <option value="vencimiento_plazo">Vencimiento del plazo (Art.159 N°4)</option>
            <option value="conclusion_faena">Conclusión de la faena (Art.159 N°5)</option>
            <option value="necesidades_empresa">Necesidades de la empresa (Art.161)</option>
            <option value="despido_indirecto">Autodespido (Art.171)</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Sueldo Base ($)</label>
          <input type="number" id="fin_sb" class="input-field" min="0" step="1" required>
        </div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Aviso previo 30 días?</label>
          <select id="fin_aviso" class="input-field">
            <option value="1">Sí, se avisó con 30 días</option>
            <option value="0">No se avisó</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Días trabajados (último período)</label>
          <input type="number" id="fin_dias" class="input-field" min="0" max="30" step="0.5" value="0">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Horas Extra Pendientes ($)</label>
          <input type="number" id="fin_he" class="input-field" min="0" step="1" value="0">
        </div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Otros Bonos / Pagos ($)</label>
          <input type="number" id="fin_bonos" class="input-field" min="0" step="1" value="0">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Observaciones</label>
          <textarea id="fin_obs" class="input-field" rows="2" placeholder="Opcional..."></textarea>
        </div>
      </div>
      <div id="fin_preview" class="hidden bg-dark-800/50 rounded-lg p-4 border border-amber-700/50">
        <h3 class="text-sm font-semibold text-amber-400 mb-3">Vista Previa del Cálculo</h3>
        <div id="fin_preview_data" class="text-xs text-slate-300 space-y-1"></div>
      </div>
      <div class="flex justify-end gap-3">
        <button type="button" onclick="cancelarFormulario()" class="btn-secondary">Cancelar</button>
        <button type="submit" class="btn-primary flex items-center gap-2"><i class="fas fa-save"></i> Generar Finiquito</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/js/app/finiquitos.js"></script>
{% endblock %}
