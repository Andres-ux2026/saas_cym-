<div id="modal-voz" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm hidden" role="dialog">
    <div class="bg-dark-800 border border-dark-600 rounded-2xl p-6 max-w-md w-full mx-4 shadow-2xl">
        <div class="flex items-center justify-between mb-5">
            <h3 class="text-lg font-bold text-white flex items-center gap-2"><i class="fas fa-microphone text-primary-400"></i>Asistente de voz</h3>
            <button onclick="cerrarModalVoz()" class="text-slate-500 hover:text-white transition-colors">&times;</button>
        </div>
        <div class="space-y-4">
            <label class="flex items-center justify-between p-3 rounded-lg bg-dark-700/50 cursor-pointer">
                <span class="text-sm text-slate-300">Asistente de voz activo</span>
                <input type="checkbox" id="voz-activado" class="toggle" />
            </label>
            <label class="flex items-center justify-between p-3 rounded-lg bg-dark-700/50 cursor-pointer">
                <span class="text-sm text-slate-300">Respuestas por voz</span>
                <input type="checkbox" id="voz-respuestas" class="toggle" />
            </label>
            <label class="flex items-center justify-between p-3 rounded-lg bg-dark-700/50 cursor-pointer">
                <span class="text-sm text-slate-300">Notificación WhatsApp</span>
                <input type="checkbox" id="voz-notificacion" class="toggle" />
            </label>
            <div id="voz-whatsapp-field" class="hidden">
                <label class="result-label block mb-1">Número WhatsApp cliente</label>
                <input type="text" id="voz-whatsapp-numero" class="input-field" placeholder="+56912345678" />
            </div>
        </div>
        <button id="btn-guardar-voz" class="btn-primary w-full mt-6"><i class="fas fa-save mr-2"></i>Guardar configuración</button>
    </div>
</div>
