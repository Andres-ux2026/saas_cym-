<div id="cambios-banner" class="banner-cambio flex items-start gap-3 hidden">
    <i class="fas fa-exclamation-triangle text-yellow-400 mt-0.5"></i>
    <div class="flex-1">
        <p class="text-sm font-semibold text-yellow-300">Parámetros actualizados</p>
        <p class="text-xs text-yellow-200/70" id="cambios-desc">Se detectaron cambios en los valores previsionales. Revisa las novedades.</p>
    </div>
    <button onclick="this.parentElement.classList.add('hidden')" class="text-yellow-400/60 hover:text-yellow-300 text-sm">&times;</button>
</div>

<div id="voz-banner" class="banner-voz flex items-start gap-3">
    <i class="fas fa-microphone text-primary-400 mt-1"></i>
    <div class="flex-1">
        <p class="text-sm font-semibold text-primary-300">Asistente de voz activo</p>
        <p class="text-xs text-slate-400">Usa el micrófono para llenar campos o comandos: <span class="text-primary-400 font-mono">calcular</span>, <span class="text-primary-400 font-mono">limpiar</span>, <span class="text-primary-400 font-mono">modo bruto</span></p>
    </div>
    <button onclick="this.parentElement.classList.add('hidden')" class="text-slate-500 hover:text-slate-300 text-sm">&times;</button>
</div>
