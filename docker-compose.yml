services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: saas_cym
      POSTGRES_USER: saas_cym
      POSTGRES_PASSWORD: ${DB_PASSWORD:-saas_cym_pass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_cym"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: saas_cym
      DB_USER: saas_cym
      DB_PASSWORD: ${DB_PASSWORD:-saas_cym_pass}
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles

volumes:
  postgres_data:
  static_volume:
